<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Skin Daily Reward</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
            gap: 20px;
        }

        /* --- UI PEMILIH SKIN --- */
        .skin-selector {
    display: grid; 
    grid-template-columns: repeat(4, 1fr); /* Maksimal 4 tombol per baris */
    gap: 10px; 
    z-index: 100;
    width: 90%;
    max-width: 400px; /* Samakan dengan lebar modal agar simetris */
    margin-bottom: 20px;
}

.btn-skin {
    padding: 12px 5px; 
    border-radius: 12px; 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05); 
    color: #ccc; 
    font-weight: bold; 
    font-size: 11px;
    transition: 0.3s;
    text-align: center;
    backdrop-filter: blur(5px);
}

.btn-skin:hover { 
    background: #ffd700; 
    color: #000; 
    transform: translateY(-2px); 
}
        /* --- MODAL STYLE --- */
        .modal-deep-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(1px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .exclusive-modal-box {
            position: relative; width: 90%; max-width: 400px;
            background-size: cover; background-position: center;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .glass-inner-layer {
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(1px);
            padding: 25px 15px 15px;
        }

        .title-main {
            color: #fff; font-size: 24px; font-weight: 900; text-align: center;
            text-transform: uppercase; margin-bottom: 25px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        .reward-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .chest-item {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .chest-item img { width: 70%; height: auto; }

        .ready-item img { 
            animation: chestFloatReady 2.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
        }

        @keyframes chestFloatReady {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        .claimed-item { filter: grayscale(1); opacity: 0.4; }
        .center-claimed-tag {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-5deg);
            background: #ffd700; color: #000; padding: 4px 12px;
            border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 10;
        }

        .ready-item { border: 1px solid rgba(255, 215, 0, 0.8) !important; background: rgba(255, 215, 0, 0.15); }

        .day-7-special {
            grid-column: span 3; margin-top: 10px;
            flex-direction: row !important; justify-content: space-around;
            padding: 20px !important; background: rgba(255, 255, 255, 0.2);
        }
        .day-7-special b { color: #ffd700; font-size: 18px; }

        .btn-claim-deep {
            width: 100%; margin-top: 30px; padding: 18px;
            border-radius: 18px; border: none;
            background: linear-gradient(180deg, #ffde59 0%, #ff914d 100%);
            color: #000000; font-weight: 900; font-size: 18px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 8px 20px rgba(255, 145, 77, 0.4);
        }

    
.header-actions {
    position: absolute;
    top: 15px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 100;
}

/* 1. Container Utama di Pojok Kanan Atas */
.header-actions { 
    position: absolute; 
    top: 15px; 
    right: 15px; 
    display: flex; 
    gap: 8px; /* Jarak antara tombol ? dan X */
    z-index: 100; 
}

/* 2. Styling Tombol (Berlaku untuk Info dan Close) */
.btn-info, .btn-close { 
    width: 30px; 
    height: 30px; 
    background: rgba(255, 255, 255, 0.15); 
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%; /* Biar bulat sempurna */
    color: #fff; 
    font-size: 14px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all 0.2s ease;
    backdrop-filter: blur(5px);
    font-weight: 900;
}

/* 3. Efek Hover */
.btn-info:hover, .btn-close:hover { 
    background: rgba(255, 255, 255, 0.3); 
    transform: scale(1.1);
    opacity: 1;
}

/* 4. Update CSS Info Box agar posisinya pas di bawah tombol */
.info-box {
    display: none; 
    position: absolute; 
    top: 40px; 
    right: 0; 
    width: 200px;
    background: rgba(15, 15, 15, 0.98); /* Lebih gelap biar teks kebaca */
    border: 1px solid #ffd700;
    color: #eee; 
    padding: 12px;
    border-radius: 12px; 
    font-size: 11px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    z-index: 110;
}

.info-box.active {
    display: block;
    animation: fadeIn 0.2s ease;
}

@keyframes popIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* STATUS MISSED - Background agak merah gelap */
.missed-item {
    filter: grayscale(0.5);
    background: rgba(255, 69, 58, 0.2) !important;
    border: 1px solid rgba(255, 69, 58, 0.5) !important;
}


.recover-tag {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(5deg);
    background: #ff453a;
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 900;
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.pay-info {
    font-size: 9px;
    color: #ff453a;
    margin-top: 5px;
    font-weight: bold;
}

/* Overlay untuk Pop Up Bayar */
.pay-modal-overlay {
    position: absolute; /* Biar muncul di dalam modal utama */
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(5px);
    display: none; /* Sembunyi dulu */
    justify-content: center;
    align-items: center;
    z-index: 200;
    border-radius: 20px;
}

.pay-modal-content {
    background: #1a1a1a;
    border: 2px solid #ff453a;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 250px;
    box-shadow: 0 0 30px rgba(255, 69, 58, 0.4);
    animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.pay-modal-content h3 { color: #fff; margin: 0 0 10px; font-size: 18px; }
.pay-modal-content p { color: #ccc; font-size: 13px; margin-bottom: 20px; }

.pay-btn-confirm {
    background: linear-gradient(180deg, #ff453a, #a30000);
    color: white; border: none; padding: 12px 25px;
    border-radius: 10px; font-weight: 900; cursor: pointer;
    width: 100%; margin-bottom: 10px;
}

.pay-btn-cancel {
    background: none; color: #777; border: none; cursor: pointer;
    font-size: 12px; font-weight: bold;
}

@keyframes popScale {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
/* Teks Nominal Reward (Warna Kuning/Emas) */
.reward-value {
    font-size: 10px;
    color: #ffd700; /* Warna emas */
    font-weight: 900;
    margin-top: 5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Khusus Teks Biaya Missed (Warna Merah) */
.missed-cost {
    font-size: 9px;
    color: #ff453a;
    font-weight: 900;
    margin-top: 5px;
}

    </style>
</head>
<body>
<h5 style="color: white;">click for modal UI </h5>
    <div class="skin-selector">
        
        <button class="btn-skin" onclick="renderModal('skin1')">Skin 1 (treasure)</button>
        <button class="btn-skin" onclick="renderModal('skin2')">Skin 2 (Candy)</button>
        <button class="btn-skin" onclick="renderModal('skin3')">Skin 3 (Pirate)</button>
        <button class="btn-skin" onclick="renderModal('skin4')">Skin 4 (Sea World)</button>
        <button class="btn-skin" onclick="renderModal('skin5')">Skin 5 (Wukong Rush)</button>
        <button class="btn-skin" onclick="renderModal('skin6')">Skin 6 (Gold Miner)</button>
        <button class="btn-skin" onclick="renderModal('skin7')">Skin 7 (Cai Shen)</button>
        <button class="btn-skin" onclick="renderModal('skin8')">Skin 8 (Lucky Clover)</button>
    </div>

    <div id="app"></div>

    <script>
        // --- DATA ASSET TIAP SKIN ---
        // Silakan edit link gambar di bawah ini
        const skins = {
            skin1: {
                bg: "https://www.rpgfan.com/wp-content/uploads/2023/05/Cat-Quest-III-Screenshot-013.webp",
                goldChest: "https://static.wikia.nocookie.net/piratepower/images/3/32/Icon_Gold_Chest.png/revision/latest?cb=20160313142816",
                luxuryChest: "https://gallery.yopriceville.com/var/resizes/Free-Clipart-Pictures/Money.PNG/Gold_Coins_Treasure_Chest_PNG_Clipart_Picture.png?m=1629832499"
            },
            skin2: {
                bg: "https://media.craiyon.com/2025-10-08/-mnfkA2SR-KNvV35J6gTQQ.webp",
                goldChest: "https://png.pngtree.com/recommend-works/png-clipart/20250101/ourmid/pngtree-candy-lollipop-png-image_14953143.png",
                luxuryChest: "https://png.pngtree.com/png-vector/20240101/ourmid/pngtree-sweethearts-candy-box-clipart-filled-with-candys-and-cookies-png-image_11397414.png"
            },
            skin3: {
                bg: "https://wallpapers.com/images/hd/sea-of-thieves-phone-57ntpqh5113chhfy.jpg",
                goldChest: "https://png.pngtree.com/png-vector/20240515/ourmid/pngtree-box-crate-in-pixel-art-style-png-image_12445203.png",
                luxuryChest: "https://png.pngtree.com/png-clipart/20230929/original/pngtree-treasure-chest-illustration-png-image_13016720.png"
            },
            skin4: {
                bg: "https://media.craiyon.com/2025-09-29/osj_g3ZlRYW-jlY9xDmIEA.webp",
                goldChest: "https://png.pngtree.com/png-vector/20240830/ourmid/pngtree-white-pearl-clipart-isolated-on-black-background-png-image_13673806.png",
                luxuryChest: "https://static.vecteezy.com/system/resources/previews/055/298/385/non_2x/3d-render-of-a-pearl-in-a-seashell-png.png"
            },
             skin5: {
                bg: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin5_bg.png",
                goldChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin5_gc.png",
                luxuryChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin5_lc.png"
            },
            skin6: {
                bg: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin6_bg.png",
                goldChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin6_gc.png",
                luxuryChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin6_lc.png"
            },
            skin7: {
                bg: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin7_bg.png",
                goldChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin7_gc.png",
                luxuryChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin7_lc.png"
            },
            skin8: {
                bg: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin8_bg.png",
                goldChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin8_gc.png",
                luxuryChest: "https://aix-asset.s3.ap-southeast-1.amazonaws.com/global/default/icon/daily-reward/skin8_lc.png"
            },
        };

        const rewards = [
        { day: 1, status: 'claimed', rewardAmount: 'Rp 1.000' },
        { day: 2, status: 'missed', rewardAmount: 'Rp 2.000' },
        { day: 3, status: 'ready', rewardAmount: 'Rp 3.000' },
        { day: 4, status: 'locked', rewardAmount: 'Rp 4.000' },
        { day: 5, status: 'locked', rewardAmount: 'Rp 5.000' },
        { day: 6, status: 'locked', rewardAmount: 'Rp 6.000' },
        { day: 7, status: 'locked', rewardAmount: 'Rp 10.000' }
    ];

        function renderModal(skinKey) {
    const container = document.getElementById('app');
    const selectedSkin = skins[skinKey];
    if (!selectedSkin) return;

    container.innerHTML = `
        <div class="modal-deep-overlay" id="mainModal">
            <div class="exclusive-modal-box" style="background-image: url('${selectedSkin.bg}')">
                <div class="pay-modal-overlay" id="payModal">
                    <div class="pay-modal-content">
                        <h3>RECOVER REWARD</h3>
                        <p>Bayar <span style="color:#ffd700">RP. 1.000</span> untuk mengambil hadiah yang terlewat?</p>
                        <button class="pay-btn-confirm" onclick="confirmPayment()">PAY NOW</button>
                        <button class="pay-btn-cancel" onclick="closePayModal()">CANCEL</button>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="btn-info" onclick="toggleInfo(event)">?</div>
                    <div class="btn-close" onclick="document.getElementById('mainModal').remove()">✕</div>
                    <div class="info-box" id="myInfoBox">
                        <b style="color:#ffd700">INFO REWARD</b><br>
                        • Login tiap hari untuk klaim.<br>
                        • <span style="color:#ff453a">Missed:</span> Bayar 100 Diamond.<br>
                        • Day 7 adalah Mega Treasure.
                    </div>
                </div>

                <div class="glass-inner-layer">
                    <div class="title-main">Daily Rewards</div>
                    <div class="reward-grid">
                        ${rewards.slice(0, 6).map(r => {
                            let statusClass = '';
                            if (r.status === 'ready') statusClass = 'ready-item';
                            else if (r.status === 'claimed') statusClass = 'claimed-item';
                            else if (r.status === 'missed') statusClass = 'missed-item';

                            return `
                                <div class="chest-item ${statusClass}" 
                                    ${r.status === 'missed' ? `onclick="handleRecover(${r.day})"` : ''} 
                                    style="${r.status === 'missed' ? 'cursor:pointer' : ''}">
                                    
                                    ${r.status === 'claimed' ? '<div class="center-claimed-tag">CLAIMED</div>' : ''}
                                    ${r.status === 'missed' ? '<div class="recover-tag">RECOVER</div>' : ''}
                                    
                                    <span style="font-size:10px; color:black; margin-bottom:5px; font-weight:900;">DAY ${r.day}</span>
                                    <img src="${selectedSkin.goldChest}">
                                    
                                    ${r.status === 'missed' 
                                        ? `<span class="missed-cost">Bayar: Rp 1.000</span>` 
                                        : `<span class="reward-value">${r.rewardAmount}</span>`
                                    }
                                </div>
                            `;
                        }).join('')}
                        
                        <div class="chest-item day-7-special">
                            <div style="text-align:left">
                                <span style="font-size:10px; color:black; display:block; font-weight:900;">EXCLUSIVE</span>
                                <b>DAY 07 CHEST</b>
                                <div class="reward-value" style="font-size: 14px;">${rewards[6].rewardAmount}</div>
                            </div>
                            <img src="${selectedSkin.luxuryChest}">
                        </div>
                    </div>
                    <button class="btn-claim-deep" id="claimBtn">CLAIM NOW</button>
                </div>
            </div>
        </div>
    `;
    
    // Logika tombol claim utama
    document.getElementById('claimBtn').onclick = function() {
        this.innerText = "COLLECTED!";
        this.disabled = true;
        setTimeout(() => { document.getElementById('mainModal').remove(); }, 1000);
    };
}

let selectedDayToRecover = null;

function handleRecover(day) {
    selectedDayToRecover = day;
    const payModal = document.getElementById('payModal');
    payModal.style.display = 'flex';
}

function closePayModal() {
    const payModal = document.getElementById('payModal');
    payModal.style.display = 'none';
}

function confirmPayment() {
    // Simulasi bayar
    const payModal = document.getElementById('payModal');
    const content = payModal.querySelector('.pay-modal-content');
    
    content.innerHTML = `
        <div style="font-size: 40px;">✅</div>
        <h3 style="color:#ffd700">SUCCESS!</h3>
        <p>Day ${selectedDayToRecover} has been claimed.</p>
    `;
    
    setTimeout(() => {
        closePayModal();
        // Reset isi modal ke semula biar bisa dipake lagi
        renderModal('skin1'); // Refresh tampilan
    }, 2000);
}

function confirmPayment() {
    // 1. Cari data di array rewards berdasarkan hari yang dipilih
    const dayData = rewards.find(r => r.day === selectedDayToRecover);
    
    if (dayData) {
        // 2. Ubah statusnya dari 'missed' menjadi 'claimed'
        dayData.status = 'claimed';
        
        // 3. Tampilkan efek sukses di modal bayar
        const payModal = document.getElementById('payModal');
        const content = payModal.querySelector('.pay-modal-content');
        
        content.innerHTML = `
            <div style="font-size: 40px; margin-bottom:10px;">✅</div>
            <h3 style="color:#ffd700">PAYMENT SUCCESS!</h3>
            <p>Day ${selectedDayToRecover} status updated to Claimed.</p>
        `;
        
        // 4. Tunggu 1.5 detik, tutup modal bayar, lalu refresh modal utama
        setTimeout(() => {
            closePayModal();
            
            // Ambil skin yang sedang aktif saat ini (kita simpan di variabel global atau ambil manual)
            // Di sini saya asumsikan kamu pakai 'skin1' atau skin yang terakhir dipilih
            renderModal('skin1'); 
        }, 1500);
    }
}
// Tambahan: Klik di mana saja untuk tutup info box
document.addEventListener('click', function() {
    const infoBox = document.getElementById('myInfoBox');
    if (infoBox) infoBox.classList.remove('active');
});

        // Tampilkan skin default saat pertama kali buka
        window.onload = () => renderModal('');
    </script>
</body>
</html>
